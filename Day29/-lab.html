<script>
  // Diagnostic net: if the CDN libraries fail to load (no internet, blocked
  // domain, ad-blocker, etc.) or the app throws while starting, show a clear
  // on-page message instead of a silent blank screen.
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if(!root) return;
    if(root.getAttribute('data-booted') === 'true') return; // app already running fine
    root.innerHTML =
      '<div style="max-width:640px;margin:60px auto;padding:28px;font-family:sans-serif;' +
      'background:#1a2440;border:1px solid #37447a;border-radius:16px;color:#eaeef8;">' +
      '<h2 style="margin-top:0;">Operation Lifeline could not start</h2>' +
      '<p style="color:#8d97bd;line-height:1.6;">' + (window.__libError || e.message || 'An unexpected script error occurred.') + '</p>' +
      '<p style="color:#8d97bd;line-height:1.6;">This app loads React and Babel from unpkg.com, so it needs an active internet ' +
      'connection the first time it opens. Things to try:</p>' +
      '<ul style="color:#8d97bd;line-height:1.7;">' +
      '<li>Check that this device is connected to the internet</li>' +
      '<li>Disable ad-blockers / privacy extensions for this page, then reload</li>' +
      '<li>Open this file in Chrome, Edge, or Firefox rather than an in-app browser</li>' +
      '<li>Open the browser console (F12) and share any red error text if this persists</li>' +
      '</ul></div>';
  });
  setTimeout(function(){
    var root = document.getElementById('root');
    if(root && root.getAttribute('data-booted') !== 'true'){
      window.dispatchEvent(new ErrorEvent('error', {message: window.__libError || 'The app did not finish loading in time.'}));
    }
  }, 6000);
</script>
<style>
  :root{
    --bg-deep:#0a0f1e;
    --bg-panel:#111a2e;
    --bg-panel-raised:#182444;
    --bg-panel-hover:#1e2c52;
    --border:#263355;

    --text-primary:#eaeef8;
    --text-muted:#8d97bd;
    --text-faint:#5c6690;

    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(91,141,239,0.14), transparent 60%),
      radial-gradient(ellipse 900px 600px at 110% 10%, rgba(242,169,59,0.10), transparent 60%),

    color:var(--text-primary);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  ::selection{background:var(--accent-blue);color:#fff;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:10px;}
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--accent-teal);outline-offset:2px;}
  a{color:var(--accent-blue);}

  .app-shell{max-width:1180px;margin:0 auto;padding:28px 24px 64px;}

  /* ---------- Stage Rail (signature element: shipping-lane tracker) ---------- */
  .rail-wrap{margin:0 0 36px;}
  .rail-track{position:relative;display:flex;justify-content:space-between;align-items:center;padding:0 4px;}
  .rail-line{position:absolute;left:16px;right:16px;top:15px;height:2px;background:var(--border);z-index:0;}
  .rail-line-fill{position:absolute;left:16px;top:15px;height:2px;background:linear-gradient(90deg,var(--accent-teal),var(--accent-blue));z-index:1;transition:width 0.7s cubic-bezier(.4,0,.2,1);}
  .rail-stop{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
  .rail-dot{width:32px;height:32px;border-radius:50%;background:var(--bg-panel);border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--font-mono);color:var(--text-faint);transition:all 0.4s ease;}
  .rail-dot.done{background:var(--accent-teal);border-color:var(--accent-teal);color:#062521;}
  .rail-dot.current{border-color:var(--accent-amber);color:var(--accent-amber);box-shadow:0 0 0 4px rgba(242,169,59,0.15);}
  .rail-label{font-size:11px;letter-spacing:0.03em;color:var(--text-faint);text-align:center;max-width:88px;display:none;}
  .rail-dot.current + .rail-label, .rail-label.always{display:block;color:var(--text-muted);}

  .grid-3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent-teal);margin:0 0 8px;}
  h1,h2,h3{font-family:var(--font-display);font-weight:700;letter-spacing:0.01em;margin:0;}

  h2{font-size:clamp(22px,3vw,28px);line-height:1.15;}
  h3{font-size:18px;}

  .choice-card{cursor:pointer;position:relative;}

  .choice-card .check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s ease;}
  .choice-card.selected .check{background:var(--accent-teal);border-color:var(--accent-teal);color:#04241f;}

  .why-box{background:rgba(91,141,239,0.07);border:1px solid rgba(91,141,239,0.25);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text-muted);margin-top:10px;}

  .hero{text-align:center;padding:60px 20px 30px;}

  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .hero p{max-width:560px;margin:16px auto 0;font-size:16px;}

  .kpi-strip{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:32px;}
  .kpi-pill{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);border:1px solid var(--border);padding:8px 14px;border-radius:999px;}

  .score-ring-wrap{display:flex;justify-content:center;margin:8px 0 20px;}
  .score-big{font-family:var(--font-display);font-size:64px;font-weight:700;line-height:1;}
  .score-sub{text-align:center;color:var(--text-faint);font-size:13px;text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;}

  .feedback-block{margin-top:10px;}
  .feedback-block h3{margin-bottom:8px;}
  .feedback-block .icon-lead{font-size:20px;margin-right:8px;}
  .lessons-list{margin:8px 0 0;padding-left:20px;color:var(--text-muted);}

  .round-badge{font-family:var(--font-mono);font-size:12px;color:var(--accent-amber);border:1px solid rgba(242,169,59,0.35);background:rgba(242,169,59,0.08);padding:4px 10px;border-radius:999px;display:inline-block;margin-bottom:14px;}

  .fade-in{animation:fadeIn 0.5s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    *{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
  }

  @media(max-width:600px){
    .app-shell{padding:18px 14px 48px;}
    .panel{padding:20px;}
    .btn-row{justify-content:stretch;}
    .btn-row .btn{flex:1;}
  }
</style>
</head>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo} = React;

/* =========================================================================
   DATA
   ========================================================================= */

const INDUSTRIES = [
  {name:'Automotive Manufacturing', unit:'vehicles'},
  {name:'Consumer Electronics', unit:'devices'},
  {name:'Pharmaceuticals', unit:'doses'},
  {name:'Fashion & Apparel', unit:'garments'},
  {name:'Food & Beverage', unit:'cases'},
  {name:'Industrial Machinery', unit:'machines'},
  {name:'Retail & E-commerce', unit:'orders'},
  {name:'Semiconductor Manufacturing', unit:'chips'},
];

const NAME_PREFIX = ['Northbridge','Vantage','Ironclad','Meridian','Solace','Cobalt','Summit','Anchor','Falcon','Harbor','Redwood','Titan','Vertex','Orbital','Granite','Cascade'];
const NAME_SUFFIX = ['Industries','Group','Holdings','Dynamics','Manufacturing Co.','Global','Systems','Logistics','Corporation','Works'];
const COUNTRIES = ['United States','Germany','Vietnam','Mexico','India','China','Brazil','Poland','South Korea','Netherlands','Japan','Turkey','Malaysia','Canada'];

function rand(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr){ return arr[rand(0, arr.length - 1)]; }
function pickN(arr, n){
  const copy = [...arr];
  const out = [];
  for(let i=0;i<n && copy.length;i++){
    out.push(copy.splice(rand(0, copy.length-1),1)[0]);
  }
  return out;
}
function clamp(v){ return Math.max(0, Math.min(100, Math.round(v))); }
function fmtMoney(n){
  if(n >= 1000) return '$' + (n/1000).toFixed(2) + 'B';
  return '$' + n + 'M';
}

function generateCompany(){
  const industry = pick(INDUSTRIES);
  const name = `${pick(NAME_PREFIX)} ${pick(NAME_SUFFIX)}`;
  const revenue = rand(180, 4800); // in millions
  const factories = rand(2, 14);
  const warehouses = rand(3, 20);
  const suppliers = rand(15, 120);
  const inventoryDays = rand(12, 60);
  const leadTime = rand(8, 45);
  const countries = pickN(COUNTRIES, rand(3, 6));
  return {name, industry: industry.name, unit: industry.unit, revenue, factories, warehouses, suppliers, inventoryDays, leadTime, countries};
}

const CRISES = [
  {
    id:'fire', title:'Factory Fire', icon:'🔥', urgency:'Critical',
    summary:(c)=>`A fire broke out at one of your ${c.factories} factories in ${pick(c.countries)}, halting production of ${c.unit} at that site.`,
    impact:(c)=>`Roughly ${rand(15,35)}% of your monthly ${c.unit} output is offline. With ${c.inventoryDays} days of inventory on hand, the clock is already running.`,
  },
  {
    id:'bankruptcy', title:'Supplier Bankruptcy', icon:'⚠️', urgency:'High',
    summary:(c)=>`One of your key suppliers, responsible for a critical component, has filed for bankruptcy without warning.`,
    impact:(c)=>`Out of your ${c.suppliers} suppliers, this one held a single-source contract. Replacing them could take longer than your ${c.leadTime}-day lead time allows.`,
  },
  {
    id:'strike', title:'Port Strike', icon:'⚓', urgency:'Critical',
    summary:(c)=>`Dockworkers at a major port used by your operations in ${pick(c.countries)} have gone on strike with no resolution date.`,

  },
  {
    id:'cyber', title:'Cyberattack', icon:'🛰️', urgency:'Critical',
    summary:(c)=>`A ransomware attack has locked the systems that manage orders and inventory across your ${c.warehouses} warehouses.`,
    impact:(c)=>`Visibility into stock levels and shipments is degraded company-wide. Manual workarounds are slow and error-prone.`,
  },
  {
    id:'flood', title:'Regional Flooding', icon:'🌊', urgency:'High',
    summary:(c)=>`Severe flooding has cut off road access to several supplier facilities in ${pick(c.countries)}.`,
    impact:(c)=>`Ground transport routes feeding into your ${c.leadTime}-day supply pipeline are impassable for an estimated one to three weeks.`,
  },
  {
    id:'shortage', title:'Raw Material Shortage', icon:'⛏️', urgency:'High',
    summary:(c)=>`A key raw material used across your product line has become scarce due to a global supply crunch.`,
    impact:(c)=>`Spot market prices for the material have spiked, threatening margins on the ${c.unit} you produce.`,
  },
  {
    id:'conflict', title:'Political Conflict', icon:'🗺️', urgency:'Critical',
    summary:(c)=>`Escalating political tension in ${pick(c.countries)} has triggered new export restrictions affecting your supply base.`,
    impact:(c)=>`Customs delays and new tariffs threaten both cost and delivery timelines for shipments tied to that region.`,

  {
    id:'shipdelay', title:'Shipping Delay', icon:'🚢', urgency:'Medium',

    impact:(c)=>`Delivery windows have slipped by ${rand(1,4)} weeks, putting pressure on customer commitments.`,
  },
];

function generateCrisis(company){
  const template = pick(CRISES);
  return {
    id: template.id,
    title: template.title,
    icon: template.icon,
    urgency: template.urgency,
    summary: template.summary(company),
    impact: template.impact(company),
  };
}

const WAR_ROOM_ACTIONS = [
  {
    id:'backup_supplier', title:'Activate Backup Supplier Network', icon:'🔗',
    desc:'Switch a portion of orders to pre-vetted secondary suppliers immediately.',
    why:'Diversifying supply reduces dependency on the disrupted source, but backup suppliers often charge a premium and need time to ramp up.',

];

const NEGOTIATION_ROUNDS = [
  {
    title:'Opening Position',
    scenario:'Your supplier opens the call explaining their own costs have risen sharply and they need to pass some of it on to you.',
    choices:[
      {label:'Accept the price increase to preserve the relationship', effects:{trust:15,price:-15,leadTime:0}, note:'Builds goodwill immediately but costs you margin.'},
      {label:'Push back hard and demand the original pricing', effects:{trust:-15,price:15,leadTime:-5}, note:'Protects your margin but may sour the tone of the negotiation.'},

      {label:'Decline and keep flexibility', effects:{trust:-5,price:0,leadTime:-10}, note:'Keeps options open but you lose priority in their production queue.'},
      {label:'Offer a moderate volume increase for a trial period', effects:{trust:6,price:2,leadTime:8}, note:'Tests the relationship without a full commitment.'},
    ],
  },
  {
    title:'Payment Terms',

      {label:'Offer partial upfront payment on the next order only', effects:{trust:8,price:3,leadTime:3}, note:'A limited gesture that shows willingness without full exposure.'},

      {label:'Walk away and search for an alternative supplier', effects:{trust:-20,price:-10,leadTime:-20}, note:'High risk — only pays off if a genuinely better alternative exists.'},

const CEO_QUESTIONS = [
  {
    q:'A key customer calls, furious about delays. What do you do?',
    options:[
      {label:'Personally call them, explain transparently, and offer a concrete recovery plan', pts:25},
      {label:'Delegate to your VP of Sales with clear talking points and a follow-up date', pts:18},

  {

function BarMeter({label, value, display}){
  const [width, setWidth] = useState(0);
  useEffect(()=>{ const t = setTimeout(()=>setWidth(value), 120); return ()=>clearTimeout(t); }, [value]);
  const cls = value >= 60 ? 'good' : value >= 40 ? 'warn' : 'bad';
  return (
    <div className="bar-row">
      <div className="bar-row-top">
        <span className="name">{label}</span>
        <span className="val">{display !== undefined ? display : value + '/100'}</span>
      </div>
      <div className="bar-track">
        <div className={"bar-fill " + cls} style={{width: width + '%'}}></div>
      </div>
    </div>
  );
}

function StageRail({stageKey}){
  const idx = STAGES.findIndex(s => s.key === stageKey);
  const pct = idx <= 0 ? 0 : (idx / (STAGES.length - 1)) * 100;
  return (
    <div className="rail-wrap">
      <div className="rail-track">
        <div className="rail-line"></div>
        <div className="rail-line-fill" style={{width: `calc(${pct}% - 0px)`}}></div>
        {STAGES.map((s, i) => (
          <div className="rail-stop" key={s.key}>
            <div className={"rail-dot " + (i < idx ? 'done' : i === idx ? 'current' : '')}>
              {i < idx ? '✓' : i + 1}
            </div>
            <span className={"rail-label " + (i === idx ? 'always' : '')}>{s.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function computeFinalScores(data){
  const {metrics, riskTotal, negotiationScore, negotiation, leadershipScore, aiBonus} = data;

  const resilience = clamp(((metrics.inventory + metrics.delivery) / 2) + (aiBonus.resilience || 0));
  const costControl = clamp(((100 - metrics.cost) * 0.5 + metrics.profit * 0.5) + (aiBonus.cost || 0));
  const riskManagement = clamp(40 + riskTotal + (aiBonus.risk || 0));
  const customerSatisfaction = clamp(metrics.satisfaction + (aiBonus.satisfaction || 0));

  const overall = clamp(
    leadershipScore * 0.20 +
    negotiationScore * 0.15 +
    resilience * 0.20 +
    costControl * 0.15 +
    riskManagement * 0.15 +
    customerSatisfaction * 0.15
  );

  const categories = [
    {key:'Leadership', value: leadershipScore},
    {key:'Negotiation', value: negotiationScore},
    {key:'Resilience', value: resilience},
    {key:'Cost Control', value: costControl},
    {key:'Risk Management', value: riskManagement},
    {key:'Customer Satisfaction', value: customerSatisfaction},
  ];
  const sorted = [...categories].sort((a,b)=>a.value-b.value);
  const weakest = sorted[0];
  const strongest = sorted[sorted.length-1];

  let tier, tierColor;
  if(overall >= 85){ tier = 'Crisis Averted'; tierColor = 'var(--accent-teal)'; }
  else if(overall >= 70){ tier = 'Stabilized'; tierColor = 'var(--accent-blue)'; }
  else if(overall >= 50){ tier = 'Rough Recovery'; tierColor = 'var(--accent-amber)'; }
  else { tier = 'Company at Risk'; tierColor = 'var(--accent-red)'; }

  const mistakeCopy = {
    'Leadership': "Several of your boardroom calls prioritized short-term comfort over transparency. In a crisis, your team and your board can handle hard truths better than surprises.",
    'Negotiation': "Your supplier relationship ended weaker than it needed to be. Concessions that cost little today often buy far more trust and flexibility for the next crisis.",
    'Resilience': "Your inventory and delivery speed stayed fragile. Without safety stock or diversified sourcing, the next disruption will hit just as hard.",
    'Cost Control': "Emergency response came at a steep price. Fast fixes like air freight are sometimes necessary, but leaning on them too heavily erodes margin fast.",
    'Risk Management': "Your response actions didn't do enough to reduce structural risk. Reacting to this crisis is not the same as being protected from the next one.",
    'Customer Satisfaction': "Customers felt the disruption more than they needed to. Even when supply is constrained, clear communication protects the relationship.",
  };
  const bestCopy = {
    'Leadership': "Your boardroom decisions consistently favored honesty and decisive action — exactly what a leadership team under pressure should see.",
    'Negotiation': "You managed the supplier relationship skillfully, balancing firmness with the goodwill needed for a long-term partnership.",
    'Resilience': "You built real operational resilience — strong inventory health and delivery speed will cushion the next shock.",
    'Cost Control': "You protected margins effectively without sacrificing the response the crisis demanded.",
    'Risk Management': "Your choices meaningfully reduced structural risk, not just the symptoms of this one crisis.",
    'Customer Satisfaction': "Customers stayed with you through the disruption because you kept them informed and prioritized their experience.",
  };

  const recommendation = riskManagement < 55
    ? "Prioritize a formal supplier risk monitoring program before your next fiscal year. Early warning is cheaper than emergency response every time."
    : resilience < 55
    ? "Increase safety stock coverage and diversify at least one supplier per critical component. Your margin for error is currently too thin."
    : "Maintain your current resilience posture, but formalize it into a written playbook so the next leader doesn't have to relearn these lessons under pressure.";

  const lessons = [
    `Your weakest area was ${weakest.key} (${weakest.value}/100) — this is where the next crisis is most likely to hurt you.`,
    `Your strongest area was ${strongest.key} (${strongest.value}/100) — protect this strength as the company scales.`,
    negotiationScore < 55
      ? "Small, low-cost concessions early in a negotiation (like faster payment terms) often unlock outsized goodwill later."
      : "Trust built during calm negotiations pays off most during the next crisis, not this one.",
    costControl < 55
      ? "Emergency measures like air freight should be paired with a plan to unwind them once the crisis stabilizes."
      : "Disciplined cost control during a crisis protects your ability to invest in resilience afterward.",
  ];

  return {overall, tier, tierColor, categories, weakest, strongest, mistake: mistakeCopy[weakest.key], best: bestCopy[strongest.key], recommendation, lessons};
}

function DashboardScreen({company, crisis, allData, onReplay}){
  const result = useMemo(()=>computeFinalScores(allData), [allData]);

  return (
    <div className="panel fade-in">
      <div className="eyebrow">Final Report · {company.name}</div>
      <h2>Executive Dashboard</h2>
      <p style={{marginTop:'8px'}}>Here is how your leadership through the {crisis.title.toLowerCase()} shaped the business, scored across six executive dimensions.</p>

      <div className="score-ring-wrap" style={{marginTop:'24px'}}>
        <div style={{textAlign:'center'}}>
          <div className="score-big" style={{color: result.tierColor}}>{result.overall}</div>
          <div className="score-sub">Overall Crisis Score / 100</div>
          <div className="tag" style={{marginTop:'12px', borderColor: result.tierColor, color: result.tierColor}}>{result.tier}</div>
        </div>
      </div>

      <div className="divider"></div>

      <div style={{maxWidth:'620px', margin:'0 auto'}}>
        {result.categories.map(c => <BarMeter key={c.key} label={c.key} value={c.value} />)}
      </div>

      <div className="divider"></div>

      <div className="grid grid-2">
        <div className="card feedback-block">
          <h3><span className="icon-lead">🏆</span>Best Decision</h3>
          <p style={{marginTop:'8px'}}>{result.best}</p>
        </div>
        <div className="card feedback-block">
          <h3><span className="icon-lead">⚠️</span>Biggest Mistake</h3>
          <p style={{marginTop:'8px'}}>{result.mistake}</p>
        </div>
      </div>

      <div className="card feedback-block" style={{marginTop:'16px'}}>
        <h3><span className="icon-lead">🎯</span>Expert Recommendation</h3>
        <p style={{marginTop:'8px'}}>{result.recommendation}</p>
      </div>

      <div className="card feedback-block" style={{marginTop:'16px'}}>
        <h3><span className="icon-lead">📚</span>Lessons Learned</h3>
        <ul className="lessons-list">
          {result.lessons.map((l,i)=>(<li key={i}>{l}</li>))}
        </ul>
      </div>

      <div className="btn-row">
        <button className="btn btn-ghost" onClick={onReplay}>↻ Replay with a New Scenario</button>
      </div>
    </div>
  );
}

/* =========================================================================
   APP
   ========================================================================= */

function newGame(){
  const company = generateCompany();
  const crisis = generateCrisis(company);
  return {company, crisis};
}

function App(){
  const [stage, setStage] = useState('welcome'); // welcome | company | crisis | warroom | negotiation | boardroom | ai | dashboard
  const [game, setGame] = useState(newGame());
  const [warRoomData, setWarRoomData] = useState(null);
  const [negotiationData, setNegotiationData] = useState(null);
  const [boardroomData, setBoardroomData] = useState(null);
  const [aiData, setAiData] = useState(null);

  function start(){
    setGame(newGame());
    setStage('company');
  }

  function replay(){
    setGame(newGame());
    setWarRoomData(null);
    setNegotiationData(null);
    setBoardroomData(null);
    setAiData(null);
    setStage('company');
  }

  const railStage = stage === 'welcome' ? 'company' : stage;

  let content = null;
  if(stage === 'welcome'){
    content = <WelcomeScreen onStart={start} />;
  } else if(stage === 'company'){
    content = <CompanyScreen company={game.company} onNext={()=>setStage('crisis')} />;
  } else if(stage === 'crisis'){
    content = <CrisisScreen crisis={game.crisis} onNext={()=>setStage('warroom')} />;
  } else if(stage === 'warroom'){
    content = <WarRoomScreen onComplete={(d)=>{ setWarRoomData(d); setStage('negotiation'); }} />;
  } else if(stage === 'negotiation'){
    content = <NegotiationScreen onComplete={(d)=>{ setNegotiationData(d); setStage('boardroom'); }} />;
  } else if(stage === 'boardroom'){
    content = <BoardroomScreen onComplete={(d)=>{ setBoardroomData(d); setStage('ai'); }} />;
  } else if(stage === 'ai'){
    content = <AIStrategyScreen onComplete={(d)=>{
      setAiData(d);
      setStage('dashboard');
    }} />;
  } else if(stage === 'dashboard'){
    const allData = {
      metrics: warRoomData.metrics,
      riskTotal: warRoomData.riskTotal,
      negotiation: negotiationData.negotiation,
      negotiationScore: negotiationData.negotiationScore,
      leadershipScore: boardroomData.leadershipScore,
      aiBonus: aiData.aiBonus,
    };
    content = <DashboardScreen company={game.company} crisis={game.crisis} allData={allData} onReplay={replay} />;
  }

  return (
    <div className="app-shell">
      {stage !== 'welcome' && <StageRail stageKey={railStage} />}
      {content}
    </div>
  );
}

const __rootEl = document.getElementById('root');
try {
  ReactDOM.createRoot(__rootEl).render(<App />);
  __rootEl.setAttribute('data-booted', 'true');
} catch(e){
  window.__libError = 'The app crashed while starting: ' + e.message;
  throw e;
}
</script>
</body>
</html>

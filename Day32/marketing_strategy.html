<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #12141c;
    --ink-2: #181b26;
    --panel: #1c2030;
    --panel-2: #232838;
    --line: #333a52;
    --gold: #e8a94e;
    --gold-dim: #a9803f;
    --teal: #4fb6a8;
    --rose: #d97a6c;
    --text: #ece9e2;
    --muted: #9195ab;
    --faint: #6b7089;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(232,169,78,0.08), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(79,182,168,0.07), transparent 55%),
      var(--ink);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  h1,h2,h3,.display{font-family:'Fraunces', serif;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  ::selection{background:var(--gold); color:#12141c;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px;}

  /* Layout shell */
  .shell{
    max-width:980px;
    margin:0 auto;
    padding:32px 24px 80px;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px; border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
    background:rgba(18,20,28,0.85); backdrop-filter:blur(10px);
  }
  .brandmark{display:flex; align-items:center; gap:10px;}
  .brandmark .dot{width:10px; height:10px; border-radius:50%; background:var(--gold); box-shadow:0 0 12px var(--gold);}
  .brandmark span{font-family:'Fraunces', serif; font-weight:600; letter-spacing:0.2px;}

  /* Trail progress */
  .trail{
    display:flex; align-items:center; gap:0; margin:8px 0 40px;
    overflow-x:auto; padding-bottom:6px;
  }
  .trail-step{
    display:flex; align-items:center; flex:none;
  }
  .trail-node{
    width:30px; height:30px; border-radius:50%;
    border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-family:'IBM Plex Mono', monospace;
    color:var(--faint); background:var(--panel);
    flex:none; transition:all .3s ease;
  }
  .trail-node.done{background:var(--teal); border-color:var(--teal); color:#0d1a18;}
  .trail-node.active{background:var(--gold); border-color:var(--gold); color:#231404; box-shadow:0 0 0 4px rgba(232,169,78,0.18);}
  .trail-label{font-size:11px; color:var(--faint); margin-left:6px; margin-right:14px; white-space:nowrap;}
  .trail-label.active{color:var(--gold);}
  .trail-line{width:26px; height:1px; background:var(--line); flex:none;}

  /* Cards */
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px;
    animation: rise .45s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .card + .card{margin-top:18px;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--gold); margin-bottom:10px; display:block;
  }
  h1.display{font-size:clamp(28px,4vw,44px); line-height:1.1; margin:0 0 12px; font-weight:600;}
  h2.display{font-size:clamp(22px,3vw,28px); margin:0 0 10px; font-weight:600;}
  p.lead{color:var(--muted); font-size:16px; line-height:1.6; margin:0 0 6px;}
  .explain-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:18px;}
  @media (max-width:680px){ .explain-grid{grid-template-columns:1fr;} }
  .explain-box{background:var(--ink-2); border:1px solid var(--line); border-radius:10px; padding:16px;}
  .explain-box .k{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1px; color:var(--teal); text-transform:uppercase; margin-bottom:6px; display:block;}
  .explain-box p{margin:0; color:var(--text); font-size:14.5px; line-height:1.55;}

  /* Buttons */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 20px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); font-weight:600; font-size:14.5px;
    transition:all .18s ease;
  }
  .btn:hover{border-color:var(--gold); transform:translateY(-1px);}
  .btn-primary{background:linear-gradient(180deg, #f0bb6c, var(--gold)); color:#231404; border:none;}
  .btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}
  .btn-ghost{background:transparent;}
  .btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}
  .btn-row{display:flex; gap:12px; margin-top:26px; flex-wrap:wrap;}

  /* Mode / option cards */
  .option-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:22px;}
  @media (max-width:800px){ .option-grid{grid-template-columns:1fr;} }
  .option{
    background:var(--ink-2); border:1px solid var(--line); border-radius:12px;
    padding:22px; text-align:left; transition:all .2s ease; position:relative;
  }
  .option:hover{border-color:var(--gold); transform:translateY(-3px);}
  .option .emoji{font-size:28px; display:block; margin-bottom:10px;}
  .option h3{margin:0 0 6px; font-size:17px;}
  .option p{margin:0; color:var(--muted); font-size:13.5px; line-height:1.5;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; color:var(--faint); margin-bottom:6px; font-family:'IBM Plex Mono', monospace; letter-spacing:0.4px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--ink-2); border:1px solid var(--line); border-radius:8px;
    padding:11px 12px; color:var(--text); font-size:14.5px; font-family:'Inter', sans-serif;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--gold);}

  /* Platform / pillar chips */
  .choice-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px;}
  @media (max-width:700px){ .choice-grid{grid-template-columns:1fr;} }
  .choice{
    background:var(--ink-2); border:1.5px solid var(--line); border-radius:12px; padding:18px;
    cursor:pointer; transition:all .18s ease; text-align:left;
  }
  .choice:hover{border-color:var(--gold-dim);}
  .choice.selected{border-color:var(--gold); background:rgba(232,169,78,0.08);}
  .choice.locked{opacity:0.35; cursor:not-allowed;}
  .choice-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .choice h4{margin:0; font-size:15px;}
  .badge{font-family:'IBM Plex Mono', monospace; font-size:10px; padding:3px 8px; border-radius:20px; letter-spacing:0.5px;}
  .badge.strong{background:rgba(79,182,168,0.18); color:var(--teal); border:1px solid rgba(79,182,168,0.4);}
  .badge.weak{background:rgba(217,122,108,0.15); color:var(--rose); border:1px solid rgba(217,122,108,0.35);}
  .choice p{margin:0; font-size:13px; color:var(--muted); line-height:1.5;}
  .check{width:20px; height:20px; border-radius:50%; border:1.5px solid var(--line); flex:none; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent;}
  .choice.selected .check{background:var(--gold); border-color:var(--gold); color:#231404;}

  .counter{font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--faint); margin-top:16px;}
  .counter b{color:var(--gold);}

  /* Prompt card */
  .prompt-card{
    margin-top:22px; border:1px dashed var(--line); border-radius:12px; padding:18px 20px;
    background:repeating-linear-gradient(135deg, rgba(232,169,78,0.03) 0 10px, transparent 10px 20px);
  }
  .prompt-card .ph{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .prompt-card .ph .tag{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--teal); letter-spacing:1px; text-transform:uppercase;}
  .prompt-card pre{
    background:var(--ink); border:1px solid var(--line); border-radius:8px; padding:14px 16px;
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:#e3dfce; line-height:1.6;
    white-space:pre-wrap; word-break:break-word; margin:0 0 10px;
  }
  .copy-btn{font-family:'IBM Plex Mono', monospace; font-size:12px; background:transparent; border:1px solid var(--line); color:var(--muted); padding:6px 12px; border-radius:6px;}
  .copy-btn:hover{border-color:var(--teal); color:var(--teal);}

  /* Roadmap */
  .week{
    border-left:2px solid var(--line); padding:4px 0 20px 20px; position:relative; margin-left:6px;
  }
  .week::before{content:''; position:absolute; left:-7px; top:2px; width:12px; height:12px; border-radius:50%; background:var(--teal); border:2px solid var(--ink);}
  .week h4{margin:0 0 4px; font-size:15px; color:var(--gold);}
  .week p{margin:0; color:var(--muted); font-size:13.5px; line-height:1.6;}

  /* Event */
  .event-banner{
    border:1px solid var(--rose); background:rgba(217,122,108,0.08); border-radius:12px; padding:20px; margin-bottom:6px;
  }
  .event-banner .tag{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--rose); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:8px;}
  .option-btn{
    display:block; width:100%; text-align:left; background:var(--ink-2); border:1.5px solid var(--line);
    border-radius:10px; padding:16px; margin-top:12px; transition:all .18s ease;
  }
  .option-btn:hover{border-color:var(--gold);}
  .option-btn.chosen{border-color:var(--teal); background:rgba(79,182,168,0.08);}
  .consequence{margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--ink-2); border-left:3px solid var(--teal); font-size:14px; color:var(--text); line-height:1.6;}

  /* Report */
  .report-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:8px;}
  @media (max-width:700px){ .report-grid{grid-template-columns:1fr;} }
  .report-box{background:var(--ink-2); border:1px solid var(--line); border-radius:12px; padding:18px;}
  .report-box h4{margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:1px; font-family:'IBM Plex Mono', monospace; color:var(--teal);}
  .report-box p{margin:0; font-size:14px; color:var(--text); line-height:1.6;}
  .lesson-list{list-style:none; margin:10px 0 0; padding:0;}
  .lesson-list li{padding:10px 0; border-top:1px solid var(--line); font-size:14.5px; line-height:1.55;}
  .lesson-list li:first-child{border-top:none;}
  .lesson-list b{color:var(--gold);}

  .footer-note{margin-top:40px; text-align:center; color:var(--faint); font-size:12.5px;}
</style>
</head>

    { title:"A Sudden Follower Spike", desc:"Your follower count jumps overnight after an unrelated account shared your profile to their audience.",
      options:[
        { label:"Immediately pitch offers or products to the new audience", consequence:"A few early sales come in, but many new followers haven't built trust yet and some unfollow feeling sold to too fast." },
        { label:"Post an introduction that explains who you are and what you stand for", consequence:"New followers understand your niche clearly, and retention of the new audience stays high." },
        { label:"Do nothing different and hope they stick around", consequence:"Some genuinely interested people stay, but without context many quietly drift away within a week." },
      ]},
  ],
};

/* ---------------------------------------------------------
   SMALL SHARED COMPONENTS
--------------------------------------------------------- */

function Trail({ stageIndex }) {
  return (
    <div className="trail">
      {STAGES.map((s, i) => (
        <div className="trail-step" key={s.key}>
          <div className={"trail-node " + (i < stageIndex ? "done" : i === stageIndex ? "active" : "")}>
            {i < stageIndex ? "✓" : i + 1}
          </div>
          <span className={"trail-label " + (i === stageIndex ? "active" : "")}>{s.label}</span>
          {i < STAGES.length - 1 && <div className="trail-line" />}
        </div>
      ))}
    </div>
  );
}

function ExplainBox({ what, why }) {
  return (
    <div className="explain-grid">
      <div className="explain-box">
        <span className="k">What is this?</span>
        <p>{what}</p>
      </div>
      <div className="explain-box">
        <span className="k">Why does it matter?</span>
        <p>{why}</p>
      </div>
    </div>
  );
}

function PromptCard({ label, prompt }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    const ta = document.createElement("textarea");
    ta.value = prompt;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  }
  return (
    <div className="prompt-card">
      <div className="ph">
        <span className="tag">How to ask Claude</span>
      </div>
      <p style={{margin:"0 0 10px", color:"var(--muted)", fontSize:"13px"}}>{label}</p>
      <pre className="mono">{prompt}</pre>
      <button className="copy-btn" onClick={copy}>{copied ? "Copied ✓" : "Copy prompt"}</button>
    </div>
  );
}

    setMode("business");

    setBiz({ ...r, name: "New Client Co." });

    setPlatforms(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  function togglePillar(id) {
    setPillars(p => {
      if (p.includes(id)) return p.filter(x => x !== id);
      if (p.length >= 3) return p;
      return [...p, id];
    });
  }

  function restart() {
    setStageIndex(0);
    setMode(null);
    setBiz({ name:"", industry:"", audience:"", competitor:"", challenge:"", budget:"" });
    setPersonal({ name:"", niche:"", expertise:"", story:"", audience:"" });
    setPlatforms([]);

    setEventChoice(null);

        <ExplainBox
          what="A short, interactive simulation where you make the same decisions a marketing strategist makes for a real brand: audience, platform, content, and response to the unexpected."
          why="Anyone can generate a caption. Understanding why a strategist chooses one platform over another, or one content pillar over another, is the actual skill that transfers to real work." />

  /* ---------- STAGE: MODE SELECT ---------- */

        <div className="btn-row">

  function EventStage() {

      <div className="card">
        <span className="eyebrow">Step 7 · The unexpected happens</span>
        <h2 className="display">Real marketing rarely goes to plan</h2>
        <p className="lead">Here's a randomized curveball. A strategist's real skill shows up in how they respond, not just in the original plan.</p>

        <div className="event-banner">
          <span className="tag">Marketing Event</span>
          <h3 style={{margin:"0 0 6px"}}>{event.title}</h3>

        <PromptCard

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={() => goTo("roadmap")}>← Back</button>

  /* ---------- STAGE: REPORT ---------- */
  function buildReport() {
    const list = PILLAR_LIBRARY[libKey];
    const platList = PLATFORM_LIBRARY[libKey];
    const pillarNames = pillars.map(id => list.find(p => p.id === id)?.name).filter(Boolean);
    const platformNames = platforms.map(id => platList.find(p => p.id === id)?.name).filter(Boolean);
    const strongPicks = platforms.filter(id => platList.find(p => p.id === id)?.fit === "strong").length;
    const weakPicks = platforms.filter(id => platList.find(p => p.id === id)?.fit === "weak").length;

    const audienceSummary = mode === "personal"
      ? `${personal.name || "This creator"} is speaking to ${personal.audience || "a defined audience"} within ${personal.niche || "a specific niche"}. The clearer this stays over time, the faster trust compounds.`
      : `${biz.name || "This business"} is speaking to ${biz.audience || "a defined audience"}, competing against ${biz.competitor || "an existing player"} while working through: ${biz.challenge || "an open challenge"}.`;

    const platformSummary = platformNames.length
      ? `Focused on ${platformNames.join(", ")}. ${strongPicks >= platforms.length - weakPicks ? "This is a strong-fit lineup for the stated audience." : "This mix includes at least one lower-fit platform worth reconsidering."}`
      : "No platforms were selected.";

    const contentSummary = pillarNames.length
      ? `Built around ${pillarNames.join(", ")}. Together these balance short-term engagement with longer-term trust and authority.`
      : "No content pillars were finalized.";

    const growthPotential = strongPicks >= 2 && pillars.length === 3
      ? "High — the platform and content choices reinforce each other instead of working against each other."
      : "Moderate — the plan has a foundation, but tightening either the platform mix or the content pillars would compound results faster.";

    const bestDecision = strongPicks > 0
      ? `Prioritizing ${platList.find(p => p.id === platforms.find(id => platList.find(x=>x.id===id)?.fit==="strong"))?.name || platformNames[0] || "a strong-fit platform"} matched the platform to where the audience already pays attention.`
      : "Selecting a specific, narrow audience early gave every later decision something concrete to be judged against.";

    const biggestMistake = weakPicks > 0
      ? `Including ${platList.find(p => p.id === platforms.find(id => platList.find(x=>x.id===id)?.fit==="weak"))?.name || "a weaker-fit platform"} spreads effort into a channel less likely to reach this audience efficiently.`
      : eventChoice === null
        ? "Leaving the response to the marketing event unresolved means a real opportunity or risk went unaddressed."
        : "The plan is solid; the main risk now is simply not sticking with it long enough to compound.";

    const lessons = mode === "personal"
      ? [
          { b:"Authenticity", t:"A personal brand can't outsource its story. The specific, sometimes unflattering details are what make it believable." },
          { b:"Consistency", t:"Showing up with the same three themes over months is what turns strangers into a recognizable audience." },
          { b:"Niche clarity", t:"Trying to appeal to everyone quietly makes you memorable to no one. The narrower the promise, the sharper the growth." },
        ]
      : [
          { b:"Audience before platform", t:"Choosing a platform before understanding the audience is choosing blind. Fit follows understanding, not the other way around." },
          { b:"Fewer, sharper pillars", t:"Three consistent content themes build recognition faster than ten inconsistent ones." },
          { b:"Plan for the unexpected", t:"A strategy that only works when nothing goes wrong isn't a strategy. Build in a plan for how you'll respond, not just what you'll post." },
        ];

    return { audienceSummary, platformSummary, contentSummary, growthPotential, bestDecision, biggestMistake, lessons };
  }

  function ReportStage() {
    const r = useMemo(buildReport, [mode, biz, personal, platforms, pillars, eventChoice]);
    return (
      <div className="card">
        <span className="eyebrow">Final · Growth Report</span>
        <h2 className="display">{brandName}'s Growth Report</h2>
        <p className="lead">Here's how the full strategy holds together, end to end.</p>

        <div className="report-grid">
          <div className="report-box">
            <h4>Audience Understanding</h4>
            <p>{r.audienceSummary}</p>
          </div>
          <div className="report-box">
            <h4>Platform Strategy</h4>
            <p>{r.platformSummary}</p>
          </div>
          <div className="report-box">
            <h4>Content Strategy</h4>
            <p>{r.contentSummary}</p>
          </div>
          <div className="report-box">
            <h4>Growth Potential</h4>
            <p>{r.growthPotential}</p>
          </div>
          <div className="report-box">
            <h4>Best Decision</h4>
            <p>{r.bestDecision}</p>
          </div>
          <div className="report-box">
            <h4>Biggest Mistake</h4>
            <p>{r.biggestMistake}</p>
          </div>
        </div>

        <div className="report-box" style={{marginTop:16}}>
          <h4>Three Marketing Lessons</h4>
          <ul className="lesson-list">
            {r.lessons.map((l, i) => <li key={i}><b>{l.b}.</b> {l.t}</li>)}
          </ul>
        </div>

        <PromptCard
          label="Use this to have Claude critique the whole plan at once:"
          prompt={`Here is my full marketing plan for ${brandName}: Audience: ${mode === "personal" ? personal.audience : biz.audience}. Platforms: ${platforms.map(id=>PLATFORM_LIBRARY[libKey].find(p=>p.id===id)?.name).join(", ")}. Content pillars: ${pillars.map(id=>PILLAR_LIBRARY[libKey].find(p=>p.id===id)?.name).join(", ")}. Give me one honest critique of this plan and one specific way to strengthen it in the next 30 days.`} />

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={() => goTo("event")}>← Back</button>
          <button className="btn btn-primary" onClick={restart}>🔁 Replay with a new brand</button>
        </div>
      </div>
    );
  }

  const stageKey = STAGES[stageIndex].key;

  return (
    <div>
      <div className="topbar">
        <div className="brandmark"><span className="dot"></span><span>Think Like a Marketing Strategist</span></div>
        <span className="mono" style={{fontSize:"11px", color:"var(--faint)"}}>Day 32</span>
      </div>
      <div className="shell">
        {stageIndex > 0 && <Trail stageIndex={stageIndex} />}
        {stageKey === "welcome" && <Welcome key={runSeed} />}
        {stageKey === "mode" && <ModeSelect />}
        {stageKey === "setup" && <Setup />}
        {stageKey === "audience" && <AudienceStage />}
        {stageKey === "platforms" && <PlatformsStage />}
        {stageKey === "pillars" && <PillarsStage />}
        {stageKey === "roadmap" && <RoadmapStage />}
        {stageKey === "event" && <EventStage />}
        {stageKey === "report" && <ReportStage />}
        <p className="footer-note">Built for Day 32 · Think Like a Marketing Strategist — a single-file, offline React app.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

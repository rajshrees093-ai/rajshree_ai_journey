<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prior Authorization Story Simulator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* ============================================================
     PROFESSIONAL HEALTHCARE EDUCATION DESIGN SYSTEM
     Palette: deep navy + teal accents on a warm slate-white canvas.
     Typography: system sans for UI, a touch of letter-spacing on
     labels/eyebrows for an editorial, clinical-education feel.
     ============================================================ */
  :root{
    --navy:#0F2A4A;
    --navy-deep:#0A1F38;
    --teal:#0F766E;
    --teal-soft:#CCFBF1;
    --slate-bg:#F4F6F9;
    --card:#FFFFFF;
    --border:#E2E8F0;
    --ink:#1E293B;
    --ink-soft:#64748B;
  }
  *{ box-sizing:border-box; }
  body{
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--slate-bg);
    color: var(--ink);
  }
  #chat-feed{ scroll-behavior:smooth; }
  .bubble{ animation: rise .3s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .narration{ animation: fade .4s ease both; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .choice-btn:disabled{ opacity:.45; cursor:not-allowed; }
  .avatar{
    width:30px; height:30px; border-radius:9999px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
    box-shadow: 0 1px 2px rgba(15,23,42,0.15);
  }
  .step-dot{
    width:9px; height:9px; border-radius:9999px; flex-shrink:0;
    transition: background .25s ease, transform .25s ease;
  }
  .brand-mark{
    width:38px; height:38px; border-radius:10px;
    background: linear-gradient(135deg, var(--teal), #14b8a6);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .card-shell{
    box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 20px 40px -12px rgba(15,23,42,.18);
  }
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#CBD5E1; border-radius:8px; }
</style>
</head>
<body class="min-h-screen">

<div class="max-w-3xl mx-auto min-h-screen flex flex-col bg-white card-shell">

  <!-- HEADER -->
  <header class="text-white sticky top-0 z-20" style="background: linear-gradient(135deg, var(--navy-deep), var(--navy));">
    <div class="px-6 pt-5 pb-4">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="brand-mark">🩺</div>
          <div>
            <h1 class="text-[15px] font-bold tracking-tight leading-tight">Prior Authorization Story Simulator</h1>
            <p class="text-[11.5px] text-slate-300 mt-0.5">An interactive healthcare-education walkthrough</p>
          </div>
        </div>
        <span id="chapter-badge" class="text-[10.5px] font-semibold bg-white/10 border border-white/15 rounded-full px-3 py-1.5 font-mono whitespace-nowrap tracking-wide">CH. 1 / 8</span>
      </div>

      <!-- PROGRESS BAR -->
      <div class="flex items-center gap-2 mt-4" id="progress-bar"></div>
      <p id="chapter-title-label" class="text-[11px] text-teal-300 font-semibold mt-2 tracking-wide uppercase"></p>
    </div>
  </header>

  <!-- CHAT FEED (append-only) -->
  <main id="chat-feed" class="flex-1 overflow-y-auto px-5 py-6 space-y-4" style="background: var(--slate-bg);"></main>

  <!-- CONTROLS -->
  <footer class="border-t px-5 py-4 space-y-2 bg-white" style="border-color: var(--border);" id="controls"></footer>

  <!-- DISCLAIMER -->
  <div class="text-center text-[10.5px] text-slate-400 py-2 border-t" style="border-color: var(--border);">
    Educational simulation only · StarCare Health is a fictional, illustrative example payer
  </div>
</div>

<script>
/* =====================================================================
   CHARACTERS
   ===================================================================== */
const CHAR = {
  rahul: { name:"Rahul", emoji:"👦", side:"left",  avatarBg:"bg-slate-200", bubble:"bg-white border border-slate-200 text-slate-800", label:"text-slate-500" },
  priya: { name:"Priya", emoji:"👧", side:"right", avatarBg:"bg-teal-100", bubble:"bg-teal-700 text-white", label:"text-teal-700" },
};

/* =====================================================================
   STORY DATA — 8 chapters. Each has narration/dialogue lines revealed
   one at a time, then two choices (except the final takeaways chapter).
   StarCare Health is explicitly an illustrative example, not a real payer.
   ===================================================================== */
const SCENES = [

{
  title: "Chapter 1: The Doctor Visit",
  lines: [
    {who:"narrator", text:"City Medical Center — Tuesday morning."},
    {who:"doctor", text:"Dr. Patel: \"Rahul, your bloodwork and joint swelling confirm it — this is Rheumatoid Arthritis, an autoimmune condition. I'd like to start you on Humira, a biologic medication that can slow the disease down significantly.\""},
    {who:"rahul", text:"Rheumatoid Arthritis? I've never heard of Humira before. Is it a normal pill?"},
    {who:"doctor", text:"Dr. Patel: \"No — it's an injectable biologic, more advanced than standard pills. It's very effective, but because it's expensive and powerful, your insurance will want to review the request first. That process is called Prior Authorization, or 'PA' for short.\""},
    {who:"priya", text:"Hi Rahul, I'm Priya — a healthcare operations specialist. I help patients like you understand what happens behind the scenes with insurance. I'll be walking alongside you through this journey."}
  ],
  choices: [
    { label:"Ask Dr. Patel: \"Why can't I just start today?\"",
      response:[{who:"doctor", text:"Dr. Patel: \"Great question. Legally, we can prescribe it today — but your insurer, StarCare Health (used here as an illustrative example), requires approval before they'll cover the cost. Without that approval, you'd be paying out of pocket.\""}] },
    { label:"Ask Priya: \"What exactly do you do?\"",
      response:[{who:"priya", text:"I work on the operations side of healthcare — helping coordinate between doctors, patients, and insurance companies so treatments like this don't get stuck in limbo longer than necessary."}] }
  ]
},

{
  title: "Chapter 2: The Insurance Roadblock",
  lines: [
    {who:"narrator", text:"Later that day, at Dr. Patel's office."},
    {who:"priya", text:"Here's how this actually moves: Dr. Patel's office submits the Prior Authorization request directly to StarCare Health (illustrative example) — the payer. No pharmacy is involved at this stage at all."},
    {who:"priya", text:"The flow is simple to picture: Provider → PA Request → Payer. That's it. Three steps, one direction, until a decision comes back."},
    {who:"rahul", text:"So the pharmacy doesn't even know about any of this yet?"},
    {who:"priya", text:"Exactly. The pharmacy only gets involved once there's an approved PA on file. And here's something useful: once StarCare Health approves a PA for a specific drug like Humira, that approval is typically saved on file permanently for as long as you're on that medication — you won't need to repeat this whole process every refill."}
  ],
  choices: [
    { label:"\"How long does the payer usually take to decide?\"",
      response:[{who:"priya", text:"It varies — anywhere from a few days to a couple of weeks, depending on the payer and how urgent the request is marked. StarCare Health, in this example, typically takes about 5-10 business days for a standard (non-urgent) request."}] },
    { label:"\"What happens while we wait?\"",
      response:[{who:"rahul", text:"So I just... wait? That feels stressful when my joints are already hurting."},
                {who:"priya", text:"Totally fair. That waiting period is exactly why understanding this process matters — it helps you know what's happening instead of just feeling stuck."}] }
  ]
},

{
  title: "Chapter 3: What Is Prior Authorization?",
  lines: [
    {who:"priya", text:"Let's back up. Prior Authorization is simply your insurer's way of saying: \"Before we pay for this, show us it's medically necessary and that cheaper options were considered first.\""},
    {who:"priya", text:"You'll often hear about 'step therapy' — insurers may want proof that lower-cost treatments were tried first before approving something like Humira. It sounds like paperwork, but it isn't just bureaucracy."},
    {who:"priya", text:"For aggressive diagnoses like yours, delays caused by this process can genuinely affect disease progression. The clock matters — every week without treatment can mean more joint damage."},
    {who:"priya", text:"Here's a stat worth knowing: an AMA 2023 PA Survey found that Prior Authorization causes treatment delays in the majority of cases reported by physicians."},
    {who:"rahul", text:"Wait — so this system that's supposed to protect patients... often ends up delaying their care?"},
    {who:"priya", text:"That's the tension at the heart of PA. It exists to control costs and confirm necessity, but the tradeoff is often time — time patients don't always have to spare."}
  ],
  choices: [
    { label:"\"Is step therapy the same at every insurance company?\"",
      response:[{who:"priya", text:"No — every payer sets its own rules. StarCare Health, as our illustrative example here, has its own specific step therapy requirements that may differ from other insurers entirely."}] },
    { label:"\"Can doctors skip step therapy if it's urgent?\"",
      response:[{who:"priya", text:"Sometimes, yes — if a doctor documents that a delay would cause serious harm, many payers allow an expedited or 'urgent' review that skips some steps. It still has to be justified in writing, though."}] }
  ]
},

{
  title: "Chapter 4: Inside the Insurance Review",
  lines: [
    {who:"narrator", text:"Meanwhile, at StarCare Health's utilization review desk (illustrative example)."},
    {who:"priya", text:"When your PA request lands with StarCare Health, a reviewer checks four main things. Let me walk you through each one and why it matters."},
    {who:"priya", text:"1. Eligibility — is Rahul actively covered under this plan right now? If coverage lapsed, nothing else matters until that's resolved."},
    {who:"priya", text:"2. Clinical documentation — did Dr. Patel include lab results, exam notes, and a clear diagnosis? Incomplete charts are one of the most common reasons requests stall."},
    {who:"priya", text:"3. ICD-10 diagnosis match — does the diagnosis code on the claim match Rheumatoid Arthritis specifically? A mismatched or vague code can cause an automatic flag."},
    {who:"priya", text:"4. Step therapy history — has Rahul already tried and failed cheaper first-line treatments? This is exactly the piece that trips people up most often."},
    {who:"rahul", text:"That's a lot to get right. What if even one of these is missing?"},
    {who:"priya", text:"Even one gap can be enough to trigger a denial — which brings us to what happens next."}
  ],
  choices: [
    { label:"\"What's an ICD-10 code, exactly?\"",
      response:[{who:"priya", text:"It's a standardized medical code used across the U.S. healthcare system to describe a diagnosis precisely — think of it as a universal shorthand so insurers, doctors, and labs are all talking about the exact same condition."}] },
    { label:"\"Did Dr. Patel's office include everything needed?\"",
      response:[{who:"narrator", text:"A pause. The reviewer's screen flags one section in yellow."},
                {who:"priya", text:"Let's find out together in the next chapter..."}] }
  ]
},

{
  title: "Chapter 5: The Denial",
  lines: [
    {who:"narrator", text:"Five business days later — an envelope arrives from StarCare Health."},
    {who:"rahul", text:"It says... DENIED? Why? Did Dr. Patel do something wrong?"},
    {who:"priya", text:"Let's read the reason together: 'Denied — missing documentation of required step therapy history.' In plain terms, StarCare Health couldn't confirm that cheaper first-line treatments were tried and failed before Humira was prescribed."},
    {who:"priya", text:"Take a breath, Rahul — a denial is not the end of the road. Denial does not mean permanent. Most PA denials can be resolved through an appeal with the right documentation."},
    {who:"priya", text:"There's a system-side cost to this too, worth knowing: PA denials cost physician offices 2+ staff hours to resolve on average. This isn't just frustrating for patients — it's a real burden on provider offices as well."},
    {who:"rahul", text:"So what do we do now?"},
    {who:"priya", text:"Now we appeal — and this time, we make sure nothing is missing."}
  ],
  choices: [
    { label:"\"Is it Dr. Patel's fault this happened?\"",
      response:[{who:"priya", text:"Not necessarily — step therapy documentation requirements vary by payer and sometimes aren't obvious upfront. It's a common gap, not usually a mistake by the provider."}] },
    { label:"\"How often do denials like this get overturned?\"",
      response:[{who:"priya", text:"A meaningful share of denials are overturned on appeal, especially when the missing information is something fixable — like documentation — rather than a true coverage exclusion."}] }
  ]
},

{
  title: "Chapter 6: Filing the Appeal",
  lines: [
    {who:"narrator", text:"Back at Dr. Patel's office, the next day."},
    {who:"priya", text:"Here's what an appeal actually involves. First, we gather supporting documents — records showing which conservative treatments Rahul already tried, like NSAIDs or physical therapy, and how they didn't control his symptoms."},
    {who:"priya", text:"Second, Dr. Patel writes a Letter of Medical Necessity — a formal clinical explanation of why Humira specifically is required for Rahul's case, not just preferred."},
    {who:"priya", text:"Third, the office formally files the appeal with StarCare Health, referencing the original denial and attaching all of this new evidence."},
    {who:"rahul", text:"That sounds like a lot of extra work just to get what was already prescribed."},
    {who:"priya", text:"It is — that's exactly why documentation completeness the first time around matters so much. But the appeal path exists precisely for situations like yours, where the treatment is justified and the gap was just paperwork."}
  ],
  choices: [
    { label:"\"How long will the appeal take?\"",
      response:[{who:"priya", text:"Appeals typically take longer than the original request — often 1-2 additional weeks, since the payer has to re-review everything plus the new documentation."}] },
    { label:"\"What if the appeal is denied too?\"",
      response:[{who:"priya", text:"If that happened, there'd usually be a further option like an independent external review. But let's see how this one goes first."}] }
  ]
},

{
  title: "Chapter 7: Approval",
  lines: [
    {who:"narrator", text:"Twelve days later — a new letter arrives."},
    {who:"rahul", text:"Priya... it says APPROVED!"},
    {who:"priya", text:"That's wonderful news! StarCare Health has approved the Prior Authorization for Humira. A reference number has been issued for this approval — keep it on file, it's proof of the decision."},
    {who:"priya", text:"And remember what I mentioned earlier: this approval is saved on file. As long as you remain on Humira under this plan, you shouldn't need to repeat this entire PA process for future refills."},
    {who:"rahul", text:"So I can finally start treatment?"},
    {who:"priya", text:"Yes. The pharmacy can now fill the prescription with StarCare Health's coverage applied. This is the moment the whole process was working toward."}
  ],
  choices: [
    { label:"\"What if my dosage ever changes?\"",
      response:[{who:"priya", text:"A significant change in dosage or a switch to a different medication would typically require a new PA — but staying on the same approved treatment plan usually doesn't."}] },
    { label:"\"That took a long time for something my doctor already decided.\"",
      response:[{who:"priya", text:"You're right to feel that. It's one of the most common frustrations with this system — and exactly why understanding it can help you push through it faster next time."}] }
  ]
},

{
  title: "Chapter 8: Takeaways",
  lines: [
    {who:"narrator", text:"A few weeks later, Rahul reflects on the journey."},
    {who:"rahul", text:"I learned that getting a prescription is just the beginning. There's a whole invisible process — eligibility checks, documentation, codes, reviews — that has to happen before treatment can actually start. And that a denial isn't the end of the story; it just means something needs to be fixed and resubmitted."},
    {who:"priya", text:"From the system side, health organizations track this constantly. Three numbers matter most: the denial rate (how often first-time PA requests get rejected), the appeal rate (how often denials get contested), and the resolution time (how long the whole cycle takes from request to final decision)."},
    {who:"priya", text:"When those numbers are high or slow, it's often a sign of documentation gaps or unclear payer requirements — fixable problems, not permanent ones. That's the real goal of understanding this process: turning a confusing system into something predictable."}
  ],
  choices: null
}

];

/* =====================================================================
   STATE
   ===================================================================== */
let sceneIndex = 0;
let lineIndex = 0;

const chatFeed = document.getElementById("chat-feed");
const controls = document.getElementById("controls");
const progressBar = document.getElementById("progress-bar");
const chapterBadge = document.getElementById("chapter-badge");
const chapterTitleLabel = document.getElementById("chapter-title-label");

/* =====================================================================
   PROGRESS BAR — dots with connecting lines, built with createElement
   ===================================================================== */
function buildProgressBar(){
  progressBar.innerHTML = ""; // controls chrome only, never the chat feed
  SCENES.forEach((_, i) => {
    if (i > 0){
      const line = document.createElement("div");
      line.className = "h-[2px] flex-1 bg-white/15";
      line.dataset.line = i;
      progressBar.appendChild(line);
    }
    const dot = document.createElement("div");
    dot.className = "step-dot bg-white/20";
    dot.dataset.seg = i;
    progressBar.appendChild(dot);
  });
}
function updateProgressBar(){
  const dots = progressBar.querySelectorAll("[data-seg]");
  const lines = progressBar.querySelectorAll("[data-line]");
  dots.forEach((dot, i) => {
    dot.className = "step-dot " + (i <= sceneIndex ? "bg-teal-400 scale-125" : "bg-white/20");
  });
  lines.forEach((line, i) => {
    // line[i] sits between dot i and dot i+1
    line.className = "h-[2px] flex-1 " + (i < sceneIndex ? "bg-teal-400" : "bg-white/15");
  });
  chapterBadge.textContent = `CH. ${sceneIndex + 1} / ${SCENES.length}`;
  chapterTitleLabel.textContent = SCENES[sceneIndex].title.replace(/^Chapter \d+: /, "");
}

/* =====================================================================
   CHAT RENDERING — createElement + appendChild ONLY. No innerHTML
   assignment on the chat container at any point.
   ===================================================================== */
function appendChapterHeading(title){
  const wrap = document.createElement("div");
  wrap.className = "narration flex items-center gap-3 pt-2 pb-1";

  const lineL = document.createElement("div");
  lineL.className = "h-px flex-1 bg-slate-300";
  const lineR = document.createElement("div");
  lineR.className = "h-px flex-1 bg-slate-300";

  const label = document.createElement("span");
  label.className = "text-[11px] font-bold uppercase tracking-widest text-slate-500 whitespace-nowrap";
  label.textContent = title;

  wrap.appendChild(lineL);
  wrap.appendChild(label);
  wrap.appendChild(lineR);
  chatFeed.appendChild(wrap);
  scrollChatToBottom();
}

function buildAvatar(meta){
  const av = document.createElement("div");
  av.className = "avatar " + meta.avatarBg;
  av.textContent = meta.emoji;
  return av;
}

function appendLine(entry){
  if (entry.who === "narrator" || entry.who === "doctor"){
    const p = document.createElement("p");
    p.className = "narration text-center italic text-[13px] text-slate-500 px-8 py-1";
    p.textContent = entry.text;
    chatFeed.appendChild(p);
  } else {
    const meta = CHAR[entry.who];
    const row = document.createElement("div");
    row.className = "flex items-end gap-2.5 " + (meta.side === "left" ? "justify-start" : "justify-end flex-row-reverse");

    const avatar = buildAvatar(meta);

    const col = document.createElement("div");
    col.className = "max-w-[76%] flex flex-col " + (meta.side === "left" ? "items-start" : "items-end");

    const nameTag = document.createElement("span");
    nameTag.className = "text-[10.5px] font-semibold mb-1 tracking-wide " + meta.label;
    nameTag.textContent = meta.name.toUpperCase();

    const bubble = document.createElement("div");
    bubble.className = "bubble rounded-2xl px-4 py-2.5 text-[13.5px] leading-relaxed shadow-sm " + meta.bubble +
      (meta.side === "left" ? " rounded-bl-sm" : " rounded-br-sm");
    bubble.textContent = entry.text;

    col.appendChild(nameTag);
    col.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(col);
    chatFeed.appendChild(row);
  }
  scrollChatToBottom();
}

function appendUserChoiceEcho(label){
  const meta = CHAR.rahul;
  const row = document.createElement("div");
  row.className = "flex items-end gap-2.5 justify-start";

  const avatar = buildAvatar(meta);

  const col = document.createElement("div");
  col.className = "max-w-[76%] flex flex-col items-start";
  const nameTag = document.createElement("span");
  nameTag.className = "text-[10.5px] font-semibold mb-1 tracking-wide " + meta.label;
  nameTag.textContent = meta.name.toUpperCase();
  const bubble = document.createElement("div");
  bubble.className = "bubble rounded-2xl rounded-bl-sm px-4 py-2.5 text-[13.5px] leading-relaxed shadow-sm bg-blue-50 border border-blue-200 text-blue-900";
  bubble.textContent = label.replace(/^Ask (Dr\. Patel|Priya): /, "");
  col.appendChild(nameTag);
  col.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(col);
  chatFeed.appendChild(row);
  scrollChatToBottom();
}

function scrollChatToBottom(){
  chatFeed.scrollTop = chatFeed.scrollHeight;
}

/* =====================================================================
   CONTROLS (footer) — rebuilt on each step; this is NOT the append-only
   chat feed, so full replacement here is fine.
   ===================================================================== */
function clearControls(){
  while (controls.firstChild) controls.removeChild(controls.firstChild);
}

function renderContinueButton(){
  clearControls();
  const btn = document.createElement("button");
  btn.className = "w-full text-white text-[13.5px] font-semibold py-3 rounded-xl transition shadow-sm hover:shadow-md";
  btn.style.background = "linear-gradient(135deg, var(--navy), var(--navy-deep))";
  btn.textContent = "Continue ▸";
  btn.addEventListener("click", showNextLine);
  controls.appendChild(btn);
}

function renderChoices(scene){
  clearControls();
  const label = document.createElement("p");
  label.className = "text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1";
  label.textContent = "What does Rahul ask next?";
  controls.appendChild(label);

  scene.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice-btn w-full text-left border text-slate-800 text-[13.5px] font-medium py-2.5 px-4 rounded-xl transition mb-2 hover:border-teal-400 hover:bg-teal-50";
    btn.style.borderColor = "var(--border)";
    btn.style.background = "#FBFCFE";
    btn.textContent = choice.label;
    btn.addEventListener("click", () => selectChoice(choice, btn));
    controls.appendChild(btn);
  });
}

function renderNextChapterButton(isLast){
  clearControls();
  const btn = document.createElement("button");
  btn.className = "w-full bg-teal-700 hover:bg-teal-800 text-white text-[13.5px] font-semibold py-3 rounded-xl transition shadow-sm hover:shadow-md";
  btn.textContent = isLast ? "View Final Takeaways ▸" : "Next Chapter ▸";
  btn.addEventListener("click", goToNextChapter);
  controls.appendChild(btn);
}

function renderRestartButton(){
  clearControls();
  const btn = document.createElement("button");
  btn.className = "w-full text-white text-[13.5px] font-semibold py-3 rounded-xl transition shadow-sm hover:shadow-md";
  btn.style.background = "linear-gradient(135deg, var(--navy), var(--navy-deep))";
  btn.textContent = "🔄 Restart Story";
  btn.addEventListener("click", restartStory);
  controls.appendChild(btn);
}

/* =====================================================================
   FLOW CONTROL
   ===================================================================== */
function showNextLine(){
  const scene = SCENES[sceneIndex];
  if (lineIndex < scene.lines.length){
    appendLine(scene.lines[lineIndex]);
    lineIndex++;
    if (lineIndex < scene.lines.length){
      renderContinueButton();
    } else {
      if (scene.choices){
        renderChoices(scene);
      } else {
        renderRestartButton();
      }
    }
  }
}

function selectChoice(choice, clickedBtn){
  Array.from(controls.querySelectorAll(".choice-btn")).forEach(b => b.disabled = true);
  appendUserChoiceEcho(choice.label);
  choice.response.forEach(appendLine);
  const isLast = sceneIndex === SCENES.length - 1;
  renderNextChapterButton(isLast);
}

function goToNextChapter(){
  sceneIndex++;
  lineIndex = 0;
  updateProgressBar();
  const scene = SCENES[sceneIndex];
  appendChapterHeading(scene.title);
  renderContinueButton();
}

function restartStory(){
  sceneIndex = 0;
  lineIndex = 0;
  while (chatFeed.firstChild) chatFeed.removeChild(chatFeed.firstChild);
  updateProgressBar();
  startStory();
}

function startStory(){
  const scene = SCENES[sceneIndex];
  appendChapterHeading(scene.title);
  renderContinueButton();
}

/* =====================================================================
   INIT
   ===================================================================== */
buildProgressBar();
updateProgressBar();
startStory();
</script>
</body>
</html>

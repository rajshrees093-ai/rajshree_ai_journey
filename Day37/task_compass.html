<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Café Edition</title>
<style>
:root{
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.14);
  --text:#f5f5f7;
  --muted:#a3a3b8;
  --accent1:#ec4899; --accent2:#8b5cf6;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:var(--text);
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a3d);
  background-size:400% 400%;
  animation:gradientShift 18s ease infinite;
  overflow-x:hidden;
}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

#app{max-width:900px;margin:0 auto;padding:24px 16px 60px;}

header{text-align:center;margin-bottom:20px;}
header h1{
  font-size:2.2rem;margin:0 0 4px;
  background:linear-gradient(90deg,#ec4899,#8b5cf6,#3b82f6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  background-size:200% auto;animation:hueMove 6s linear infinite;
}
@keyframes hueMove{to{background-position:200% center;}}
.subtitle{color:var(--muted);margin:0 0 10px;}
.workplace-tag{display:inline-block;padding:5px 16px;border-radius:20px;background:var(--glass);border:1px solid var(--border);font-size:.85rem;}

.progress-wrap{margin-bottom:24px;}
.stage-dots{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:8px;flex-wrap:wrap;gap:4px;}
.stage-dot{padding:5px 10px;border-radius:12px;background:var(--glass);border:1px solid transparent;transition:all .2s ease;}
.stage-dot.active{color:#fff;border-color:var(--accent1);box-shadow:0 0 12px rgba(236,72,153,.5);}
.stage-dot.done{color:#7dd3fc;}
.progress-track{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ec4899,#8b5cf6);transition:width .5s ease;}

.glass{
  background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border);border-radius:22px;padding:28px;
  box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.stage-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.stage-label span{color:#fff;}

.task-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-left:4px solid var(--accent1);border-radius:14px;padding:18px 20px;margin-bottom:20px;}
.task-card.scenario{border-left-color:#f87171;}
.ticket-tag{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.task-text{margin:0;font-size:1.05rem;line-height:1.5;}

.dropzone{min-height:76px;border:2px dashed var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;transition:all .2s ease;padding:10px;flex-wrap:wrap;gap:8px;}
.dropzone.hover{background:rgba(236,72,153,.12);border-color:var(--accent1);transform:scale(1.01);}
.dropzone.filled{border-style:solid;}
.dz-hint{color:var(--muted);font-size:.85rem;}

.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:20px;}
.role-card{--c:#999;background:rgba(255,255,255,.05);border:1.5px solid var(--c);border-radius:14px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:grab;transition:transform .18s ease,box-shadow .18s ease,opacity .18s ease;user-select:none;}
.role-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 20px -4px var(--c);}
.role-card.selected{box-shadow:0 0 0 3px var(--c);}
.role-card.used{opacity:.22;filter:grayscale(1);pointer-events:none;cursor:default;}
.role-card.dragging{opacity:.35;}
.rc-emoji{font-size:1.6rem;}
.rc-name{font-size:.78rem;text-align:center;color:#e5e5ef;}

.placed-card{--c:#999;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1.5px solid var(--c);border-radius:12px;padding:10px 16px;cursor:pointer;}
.placed-card.snap{animation:snapIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes snapIn{0%{transform:scale(.4);opacity:0;}100%{transform:scale(1);opacity:1;}}

.action-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
.btn-primary{background:linear-gradient(90deg,#ec4899,#8b5cf6);color:#fff;border:none;padding:12px 26px;border-radius:30px;font-size:.95rem;font-weight:600;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px -4px rgba(139,92,246,.6);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}

.reveal{margin-top:6px;padding-top:16px;border-top:1px solid var(--border);animation:fadeSlide .4s ease;}
.reveal.hidden{display:none;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.reveal-row{margin-bottom:10px;line-height:1.55;font-size:.95rem;}
.reveal-row span{color:var(--muted);}
.reveal-headline{font-weight:600;margin-top:4px;}
.match{color:#4ade80;margin-right:10px;display:inline-block;}
.miss{color:#8b8ba0;margin-right:10px;display:inline-block;}

.flow-track{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:20px;}
.flow-slot{--c:#999;min-width:110px;min-height:70px;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;transition:all .2s ease;cursor:pointer;}
.flow-slot.filled{border-style:solid;border-color:var(--c);background:rgba(255,255,255,.06);}
.flow-slot.hover{background:rgba(236,72,153,.12);}
.flow-slot.travel{box-shadow:0 0 22px var(--c);}
.flow-slot.customer-slot{border-color:#fbbf24;border-style:solid;cursor:default;}
.flow-arrow{color:var(--muted);font-size:1.2rem;}

.collab-zones{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.collab-col{flex:1;min-width:220px;}
.collab-label{font-size:.85rem;color:var(--muted);margin-bottom:8px;}
.collab-label span{opacity:.7;font-size:.75rem;}

.locked{pointer-events:none;opacity:.55;}

.chart-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.bar-row:last-child{margin-bottom:0;}
.bar-label{width:170px;font-size:.85rem;flex-shrink:0;}
.bar-track{flex:1;height:14px;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#ec4899,#8b5cf6,#3b82f6);border-radius:8px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.bar-pct{width:44px;text-align:right;font-size:.85rem;color:var(--muted);}

.reflection-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;}
.reflection-card h3{margin-top:0;}
.reflection-card p{line-height:1.65;font-size:.95rem;}

#confettiLayer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;}
.confetti-piece{position:absolute;top:-20px;width:9px;height:14px;opacity:.9;animation:confettiFall linear forwards;border-radius:2px;}
@keyframes confettiFall{to{transform:translateY(105vh) rotate(540deg);opacity:.2;}}

@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake .4s;}

@media(max-width:600px){
  .glass{padding:18px;}
  header h1{font-size:1.7rem;}
  .bar-label{width:120px;font-size:.75rem;}
  .collab-zones{flex-direction:column;}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🧭 Task Compass</h1>
    <p class="subtitle">Learn how work flows through real organizations.</p>
    <p class="workplace-tag">☕ Café / Restaurant Edition</p>
  </header>

  <div class="progress-wrap">
    <div class="stage-dots">
      <div class="stage-dot" data-s="1">1 · Who Owns This?</div>
      <div class="stage-dot" data-s="2">2 · Task Routing</div>
      <div class="stage-dot" data-s="3">3 · Collaboration</div>
      <div class="stage-dot" data-s="4">🎉 Results</div>
    </div>
    <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
  </div>

  <main id="stageContainer" class="glass"></main>
</div>
<div id="confettiLayer"></div>

<script>
// ---------- DATA ----------
const ROLES = [
  {id:'barista', name:'Barista', emoji:'☕', color:'#f59e0b'},
  {id:'server', name:'Server', emoji:'🍽️', color:'#10b981'},
  {id:'kitchen', name:'Kitchen Staff', emoji:'🔪', color:'#ef4444'},
  {id:'cashier', name:'Cashier', emoji:'💵', color:'#3b82f6'},
  {id:'manager', name:'Shift Manager', emoji:'🗂️', color:'#8b5cf6'},
  {id:'owner', name:'Owner / GM', emoji:'👑', color:'#ec4899'},
  {id:'busser', name:'Busser', emoji:'🧽', color:'#06b6d4'},
  {id:'supplier', name:'Supplier Relations', emoji:'📦', color:'#84cc16'}
];

const STAGE1_TASKS = [
  {id:'t1', text:"A customer complains their coffee tastes burnt.", owner:'barista', assist:['manager','kitchen'], why:"Baristas control brew time, grind size, and machine calibration, so quality issues start with them."},
  {id:'t2', text:"The espresso machine breaks down in the middle of the morning rush.", owner:'manager', assist:['barista','owner'], why:"The shift manager coordinates an immediate fix or backup plan, and loops in the owner if equipment repair or replacement budget is needed."},
  {id:'t3', text:"A customer says their food order came out completely wrong.", owner:'server', assist:['kitchen','cashier'], why:"Servers are the direct link between the customer and the kitchen, so correcting the order at the table starts with them."},
  {id:'t4', text:"The weekly produce delivery arrives with several spoiled vegetables.", owner:'kitchen', assist:['manager','supplier'], why:"Kitchen staff are the ones inspecting ingredient quality, so they catch and flag the problem first."},
  {id:'t5', text:"A table's bill was calculated incorrectly at checkout.", owner:'cashier', assist:['server','manager'], why:"Cashiers own the point-of-sale system, making billing accuracy their responsibility."},
  {id:'t6', text:"A customer leaves a harsh review complaining about slow service.", owner:'manager', assist:['owner','server'], why:"The shift manager investigates what happened during service and adjusts staffing or workflow going forward."},
  {id:'t7', text:"A health inspection report cites cleanliness issues in the kitchen.", owner:'owner', assist:['kitchen','busser','manager'], why:"Compliance and reputation risk ultimately sit with the owner or GM, even though fixing it involves several roles."},
  {id:'t8', text:"A regular customer asks for a custom drink that's not on the menu.", owner:'barista', assist:['kitchen','manager'], why:"Baristas know what's actually feasible given the ingredients and equipment on hand."},
  {id:'t9', text:"Two baristas both call in sick on the same busy morning.", owner:'manager', assist:['owner'], why:"Day-to-day staffing and coverage decisions belong to the shift manager."},
  {id:'t10', text:"A coffee bean supplier raises prices without warning.", owner:'owner', assist:['supplier','manager'], why:"Vendor negotiations and pricing decisions affect the whole business, which is the owner's call."}
];

const STAGE2_TASKS = [
  {id:'r1', text:"A customer asks to swap one side item for another.", flow:['server','kitchen'], endsAtCustomer:true, why:"Small substitutions only need the server to relay the request to the kitchen — no manager approval required."},
  {id:'r2', text:"A customer wants a refund because their order came out wrong.", flow:['server','kitchen','cashier'], endsAtCustomer:true, why:"The server flags the mistake, the kitchen confirms what happened, and the cashier processes the refund before the loop closes."},
  {id:'r3', text:"A large catering order request comes in for next weekend.", flow:['owner','manager','kitchen','server'], endsAtCustomer:true, why:"Big orders need owner approval for cost, manager coordination for staffing, kitchen execution, and server delivery."},
  {id:'r4', text:"A barista notices the morning milk delivery came up short.", flow:['barista','manager','supplier'], endsAtCustomer:false, why:"This is an internal supply issue: the barista reports it, the manager decides how urgent it is, and supplier relations arranges a fix."},
  {id:'r5', text:"A customer tries to redeem a coupon that expired last month.", flow:['cashier','manager'], endsAtCustomer:true, why:"The cashier catches the expired coupon and checks with the manager on whether to honor it as an exception."}
];

const STAGE3_SCENARIOS = [
  {id:'s1', text:"Customer satisfaction scores have dropped noticeably over the past month.", primary:'manager', supporting:['server','kitchen','owner'], why:"The shift manager investigates daily operations first, servers offer frontline feedback, kitchen quality affects the experience, and the owner may need to approve fixes.", commFlow:"Manager gathers feedback from Server and Kitchen, then reports findings and options to Owner."},
  {id:'s2', text:"A social media post about your café goes viral overnight, bringing a huge rush of new customers.", primary:'owner', supporting:['manager','kitchen','barista'], why:"The owner sets the response strategy and any investment in extra staffing, while the manager, kitchen, and baristas handle the surge on the ground.", commFlow:"Owner sets direction, Manager relays it to Kitchen and Barista, who report back on capacity in real time."},
  {id:'s3', text:"Several reviews in the same week complain about cold food and slow table service.", primary:'manager', supporting:['server','kitchen'], why:"This is a service-flow issue the manager can diagnose directly by talking to the server and kitchen about where the slowdown happens.", commFlow:"Manager checks with Server on ticket times and Kitchen on prep speed, then adjusts the workflow."},
  {id:'s4', text:"A new competing café opens directly across the street.", primary:'owner', supporting:['manager','barista','server'], why:"Competitive strategy is an owner-level decision, but the manager, barista, and server all shape the day-to-day experience that keeps customers loyal.", commFlow:"Owner shares the strategic response, Manager translates it into daily practice, Barista and Server execute the customer-facing changes."}
];

// ---------- STATE ----------
const container = document.getElementById('stageContainer');
let state = { stage:1, roundIndex:0, s1:[], s2:[], s3:[], results:{s1:[],s2:[],s3:[]} };

// ---------- UTILITIES ----------
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function roleById(id){ return ROLES.find(r=>r.id===id); }

function createRoleCard(role){
  const card = document.createElement('div');
  card.className = 'role-card';
  card.draggable = true;
  card.dataset.role = role.id;
  card.style.setProperty('--c', role.color);
  card.innerHTML = `<span class="rc-emoji">${role.emoji}</span><span class="rc-name">${role.name}</span>`;
  return card;
}

function playSnap(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    if(!playSnap.ctx) playSnap.ctx = new AC();
    const ctx = playSnap.ctx;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = 520;
    g.gain.value = 0.05;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime+0.08);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.12);
    o.stop(ctx.currentTime+0.13);
  }catch(e){ /* audio not available, ignore */ }
}

// ---------- GAME FLOW ----------
function initGame(){
  state.stage = 1;
  state.roundIndex = 0;
  state.s1 = shuffle(STAGE1_TASKS).slice(0,3);
  state.s2 = shuffle(STAGE2_TASKS).slice(0,3);
  state.s3 = shuffle(STAGE3_SCENARIOS).slice(0,3);
  state.results = {s1:[], s2:[], s3:[]};
  updateProgress();
  renderCurrent();
}

function updateProgress(){
  const totalRounds = 9;
  let completed;
  if(state.stage===1) completed = state.roundIndex;
  else if(state.stage===2) completed = 3+state.roundIndex;
  else if(state.stage===3) completed = 6+state.roundIndex;
  else completed = 9;
  const pct = Math.round(completed/totalRounds*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.querySelectorAll('.stage-dot').forEach(d=>{
    const s = parseInt(d.dataset.s,10);
    d.classList.toggle('active', s===state.stage);
    d.classList.toggle('done', s<state.stage);
  });
}

function renderCurrent(){
  if(state.stage===1) renderStage1();
  else if(state.stage===2) renderStage2();
  else if(state.stage===3) renderStage3();
  else renderResults();
}

function advanceRound(){
  if(state.stage===1){
    if(state.roundIndex<2){ state.roundIndex++; } else { state.stage=2; state.roundIndex=0; }
  } else if(state.stage===2){
    if(state.roundIndex<2){ state.roundIndex++; } else { state.stage=3; state.roundIndex=0; }
  } else if(state.stage===3){
    if(state.roundIndex<2){ state.roundIndex++; } else { state.stage=4; }
  }
  updateProgress();
  renderCurrent();
  if(state.stage===4) celebrate();
}

// ---------- STAGE 1: WHO OWNS THIS? ----------
function renderStage1(){
  const task = state.s1[state.roundIndex];
  let selected = null;

  container.innerHTML = `
    <div class="stage-label">Stage 1 · Who Owns This? <span>(${state.roundIndex+1}/3)</span></div>
    <div class="task-card">
      <div class="ticket-tag">🎫 Incoming Task</div>
      <p class="task-text">${task.text}</p>
    </div>
    <div class="dropzone" id="s1zone"><span class="dz-hint">Drag or tap the <strong>Primary Owner</strong> here</span></div>
    <div class="role-grid" id="s1roles"></div>
    <div class="action-row"><button id="s1submit" class="btn-primary" disabled>Submit</button></div>
    <div id="s1reveal" class="reveal hidden"></div>
  `;

  const roleGrid = document.getElementById('s1roles');
  const zone = document.getElementById('s1zone');

  function place(id){
    selected = id;
    const role = roleById(id);
    zone.classList.add('filled');
    zone.innerHTML = `<div class="placed-card snap" style="--c:${role.color}"><span class="rc-emoji">${role.emoji}</span><span class="rc-name">${role.name}</span></div>`;
    playSnap();
    [...roleGrid.children].forEach(c=>c.classList.toggle('selected', c.dataset.role===id));
    document.getElementById('s1submit').disabled = false;
  }

  shuffle([...ROLES]).forEach(role=>{
    const card = createRoleCard(role);
    card.addEventListener('click', ()=>place(role.id));
    card.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', role.id); card.classList.add('dragging'); });
    card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
    roleGrid.appendChild(card);
  });

  zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('hover'); });
  zone.addEventListener('dragleave', ()=>zone.classList.remove('hover'));
  zone.addEventListener('drop', e=>{
    e.preventDefault(); zone.classList.remove('hover');
    const id = e.dataTransfer.getData('text/plain');
    if(id) place(id);
  });

  document.getElementById('s1submit').onclick = ()=>{
    const correct = selected === task.owner;
    state.results.s1.push({correct, picked:selected});
    showS1Reveal(task, selected, correct);
  };
}

function showS1Reveal(task, selected, correct){
  const ownerRole = roleById(task.owner);
  const pickedRole = roleById(selected);
  const assistNames = task.assist.map(id=>`${roleById(id).emoji} ${roleById(id).name}`).join(', ');
  const headline = correct
    ? `Nice instinct — ${pickedRole.name} is exactly who owns this.`
    : `In most cafés, this actually belongs to ${ownerRole.name}. Your pick, ${pickedRole.name}, plays a supporting role here rather than the primary one.`;

  const revealEl = document.getElementById('s1reveal');
  revealEl.innerHTML = `
    <p class="reveal-headline">${headline}</p>
    <div class="reveal-row">✓ Primary Owner: <strong style="color:${ownerRole.color}">${ownerRole.emoji} ${ownerRole.name}</strong></div>
    <div class="reveal-row">✓ Why they own it: <span>${task.why}</span></div>
    <div class="reveal-row">✓ May assist: <span>${assistNames}</span></div>
  `;
  revealEl.classList.remove('hidden');
  document.getElementById('s1zone').classList.add('locked');
  document.getElementById('s1roles').classList.add('locked');

  const btn = document.getElementById('s1submit');
  btn.textContent = state.roundIndex<2 ? 'Next Task →' : 'Continue to Stage 2 →';
  btn.disabled = false;
  btn.onclick = ()=>advanceRound();
}

// ---------- STAGE 2: TASK ROUTING ----------
function renderStage2(){
  const task = state.s2[state.roundIndex];
  const flow = task.flow;
  const slots = new Array(flow.length).fill(null);

  const distractPool = ROLES.filter(r=>!flow.includes(r.id));
  const distractCount = Math.min(distractPool.length, Math.max(2, 6-flow.length));
  const options = shuffle([...flow.map(id=>roleById(id)), ...shuffle(distractPool).slice(0,distractCount)]);

  container.innerHTML = `
    <div class="stage-label">Stage 2 · Task Routing <span>(${state.roundIndex+1}/3)</span></div>
    <div class="task-card">
      <div class="ticket-tag">🎫 Incoming Task</div>
      <p class="task-text">${task.text}</p>
    </div>
    <div class="flow-track" id="s2track"></div>
    <div class="role-grid" id="s2roles"></div>
    <div class="action-row"><button id="s2submit" class="btn-primary" disabled>Submit</button></div>
    <div id="s2reveal" class="reveal hidden"></div>
  `;

  const trackEl = document.getElementById('s2track');
  const roleGrid = document.getElementById('s2roles');

  function renderTrack(){
    trackEl.innerHTML = '';
    slots.forEach((val,i)=>{
      if(i>0){ const arrow=document.createElement('div'); arrow.className='flow-arrow'; arrow.textContent='→'; trackEl.appendChild(arrow); }
      const slot = document.createElement('div');
      slot.className = 'flow-slot'+(val?' filled':'');
      if(val){
        const role = roleById(val);
        slot.style.setProperty('--c', role.color);
        slot.innerHTML = `<span class="rc-emoji">${role.emoji}</span><span class="rc-name">${role.name}</span>`;
        slot.addEventListener('click', ()=>clearFrom(i));
      } else {
        slot.innerHTML = `<span class="dz-hint">Step ${i+1}</span>`;
      }
      slot.addEventListener('dragover', e=>{ e.preventDefault(); if(!val) slot.classList.add('hover'); });
      slot.addEventListener('dragleave', ()=>slot.classList.remove('hover'));
      slot.addEventListener('drop', e=>{
        e.preventDefault(); slot.classList.remove('hover');
        const id = e.dataTransfer.getData('text/plain');
        if(id) tryPlaceAt(i,id);
      });
      trackEl.appendChild(slot);
    });
    if(task.endsAtCustomer){
      const arrow=document.createElement('div'); arrow.className='flow-arrow'; arrow.textContent='→'; trackEl.appendChild(arrow);
      const cust=document.createElement('div'); cust.className='flow-slot customer-slot';
      cust.innerHTML = '<span class="rc-emoji">🙂</span><span class="rc-name">Customer</span>';
      trackEl.appendChild(cust);
    }
  }

  function renderRoles(){
    roleGrid.innerHTML = '';
    options.forEach(role=>{
      const used = slots.includes(role.id);
      const card = createRoleCard(role);
      if(used){
        card.classList.add('used');
        card.draggable = false;
      } else {
        card.addEventListener('click', ()=>placeNext(role.id));
        card.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', role.id); card.classList.add('dragging'); });
        card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
      }
      roleGrid.appendChild(card);
    });
  }

  function placeNext(id){
    if(slots.includes(id)) return;
    const idx = slots.findIndex(s=>s===null);
    if(idx===-1) return;
    slots[idx] = id;
    playSnap();
    renderTrack(); renderRoles(); checkReady();
  }
  function tryPlaceAt(i,id){
    if(slots[i]) return;
    if(i>0 && !slots[i-1]) return;
    if(slots.includes(id)) return;
    slots[i] = id;
    playSnap();
    renderTrack(); renderRoles(); checkReady();
  }
  function clearFrom(i){
    for(let j=slots.length-1;j>=i;j--){ slots[j]=null; }
    renderTrack(); renderRoles(); checkReady();
  }
  function checkReady(){
    document.getElementById('s2submit').disabled = slots.some(s=>s===null);
  }

  renderTrack(); renderRoles();

  document.getElementById('s2submit').onclick = ()=>{
    let matches = 0;
    slots.forEach((s,i)=>{ if(s===flow[i]) matches++; });
    state.results.s2.push({matches, total:flow.length});
    showS2Reveal(task, matches, trackEl);
  };
}

function showS2Reveal(task, matches, trackEl){
  const revealEl = document.getElementById('s2reveal');
  const correct = matches===task.flow.length;
  let compareHTML = '';
  if(!correct){
    const flowNames = task.flow.map(id=>roleById(id).name).join(' → ') + (task.endsAtCustomer ? ' → Customer' : '');
    compareHTML = `<div class="reveal-row">✓ Common routing: <span>${flowNames}</span></div>`;
  }
  revealEl.innerHTML = `
    <p class="reveal-headline">${correct ? 'That routing matches how most cafés handle it.' : 'Here is how this task commonly flows through the team.'}</p>
    ${compareHTML}
    <div class="reveal-row">✓ Why this order: <span>${task.why}</span></div>
  `;
  revealEl.classList.remove('hidden');
  document.getElementById('s2roles').classList.add('locked');

  const nodes = trackEl.querySelectorAll('.flow-slot');
  nodes.forEach((n,i)=> setTimeout(()=> n.classList.add('travel'), i*260) );

  const btn = document.getElementById('s2submit');
  btn.textContent = state.roundIndex<2 ? 'Next Task →' : 'Continue to Stage 3 →';
  btn.disabled = false;
  btn.onclick = ()=>advanceRound();
}

// ---------- STAGE 3: COLLABORATION CHALLENGE ----------
function renderStage3(){
  const scenario = state.s3[state.roundIndex];
  let primary = null;
  let supporting = [];
  const displayRoles = shuffle([...ROLES]);

  container.innerHTML = `
    <div class="stage-label">Stage 3 · Collaboration Challenge <span>(${state.roundIndex+1}/3)</span></div>
    <div class="task-card scenario">
      <div class="ticket-tag">🚨 Situation</div>
      <p class="task-text">${scenario.text}</p>
    </div>
    <div class="collab-zones">
      <div class="collab-col">
        <div class="collab-label">Primary Owner</div>
        <div class="dropzone" id="s3primary"><span class="dz-hint">Drop or tap 1 role</span></div>
      </div>
      <div class="collab-col">
        <div class="collab-label">Supporting Team <span>(up to 3)</span></div>
        <div class="dropzone" id="s3support"><span class="dz-hint">Drop or tap up to 3 roles</span></div>
      </div>
    </div>
    <div class="role-grid" id="s3roles"></div>
    <div class="action-row"><button id="s3submit" class="btn-primary" disabled>Submit</button></div>
    <div id="s3reveal" class="reveal hidden"></div>
  `;

  const roleGrid = document.getElementById('s3roles');
  const primaryZone = document.getElementById('s3primary');
  const supportZone = document.getElementById('s3support');

  function used(id){ return primary===id || supporting.includes(id); }
  function cardHTML(id){
    const role = roleById(id);
    return `<div class="placed-card snap" style="--c:${role.color}"><span class="rc-emoji">${role.emoji}</span><span class="rc-name">${role.name}</span></div>`;
  }

  function renderZones(){
    primaryZone.classList.toggle('filled', !!primary);
    if(primary){
      primaryZone.innerHTML = cardHTML(primary);
      primaryZone.firstElementChild.addEventListener('click', ()=>{ primary=null; afterChange(); });
    } else {
      primaryZone.innerHTML = '<span class="dz-hint">Drop or tap 1 role</span>';
    }

    supportZone.classList.toggle('filled', supporting.length>0);
    if(supporting.length===0){
      supportZone.innerHTML = '<span class="dz-hint">Drop or tap up to 3 roles</span>';
    } else {
      supportZone.innerHTML = '';
      supporting.forEach(id=>{
        const wrap = document.createElement('div');
        wrap.innerHTML = cardHTML(id);
        const node = wrap.firstElementChild;
        node.addEventListener('click', ()=>{ supporting = supporting.filter(r=>r!==id); afterChange(); });
        supportZone.appendChild(node);
      });
    }
  }

  function renderRoles(){
    roleGrid.innerHTML = '';
    displayRoles.forEach(role=>{
      const card = createRoleCard(role);
      if(used(role.id)){
        card.classList.add('used');
        card.draggable = false;
      } else {
        card.addEventListener('click', ()=>handlePick(role.id));
        card.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', role.id); card.classList.add('dragging'); });
        card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
      }
      roleGrid.appendChild(card);
    });
  }

  function handlePick(id){
    if(used(id)) return;
    if(!primary){
      primary = id;
    } else if(supporting.length<3){
      supporting.push(id);
    } else {
      supportZone.classList.add('shake');
      setTimeout(()=>supportZone.classList.remove('shake'),400);
      return;
    }
    playSnap();
    afterChange();
  }
  function afterChange(){ renderZones(); renderRoles(); checkReady(); }
  function checkReady(){ document.getElementById('s3submit').disabled = !primary; }

  primaryZone.addEventListener('dragover', e=>{ e.preventDefault(); primaryZone.classList.add('hover'); });
  primaryZone.addEventListener('dragleave', ()=>primaryZone.classList.remove('hover'));
  primaryZone.addEventListener('drop', e=>{
    e.preventDefault(); primaryZone.classList.remove('hover');
    const id = e.dataTransfer.getData('text/plain');
    if(!id || used(id)) return;
    primary = id;
    playSnap();
    afterChange();
  });

  supportZone.addEventListener('dragover', e=>{ e.preventDefault(); supportZone.classList.add('hover'); });
  supportZone.addEventListener('dragleave', ()=>supportZone.classList.remove('hover'));
  supportZone.addEventListener('drop', e=>{
    e.preventDefault(); supportZone.classList.remove('hover');
    const id = e.dataTransfer.getData('text/plain');
    if(!id || used(id)) return;
    if(supporting.length>=3) return;
    supporting.push(id);
    playSnap();
    afterChange();
  });

  renderZones(); renderRoles();

  document.getElementById('s3submit').onclick = ()=>{
    const idealSupport = scenario.supporting;
    const overlap = supporting.filter(id=>idealSupport.includes(id)).length;
    const overlapFraction = idealSupport.length ? overlap/idealSupport.length : 1;
    const primaryCorrect = primary===scenario.primary;
    const idealTotal = 1+idealSupport.length;
    const selectedTotal = 1+supporting.length;
    state.results.s3.push({primaryCorrect, overlapFraction, idealTotal, selectedTotal});
    showS3Reveal(scenario, primary, supporting, primaryCorrect);
  };
}

function showS3Reveal(scenario, primary, supporting, primaryCorrect){
  const revealEl = document.getElementById('s3reveal');
  const primaryRole = roleById(scenario.primary);
  const matchedHTML = scenario.supporting.map(id=>{
    const got = supporting.includes(id);
    const role = roleById(id);
    return `<span class="${got?'match':'miss'}">${got?'✓':'○'} ${role.emoji} ${role.name}</span>`;
  }).join('');
  const extras = supporting.filter(id=>!scenario.supporting.includes(id)).map(id=>roleById(id).name);

  let yourPickRow = '';
  if(!primaryCorrect && primary){
    const yourRole = roleById(primary);
    yourPickRow = `<div class="reveal-row">Your pick: <span>${yourRole.emoji} ${yourRole.name}</span> — a reasonable instinct, but ${primaryRole.name} usually leads here.</div>`;
  }

  revealEl.innerHTML = `
    <div class="reveal-row">✓ Primary Owner: <strong style="color:${primaryRole.color}">${primaryRole.emoji} ${primaryRole.name}</strong></div>
    ${yourPickRow}
    <div class="reveal-row">✓ Supporting Teams that typically help: ${matchedHTML}</div>
    ${extras.length ? `<div class="reveal-row">You also looped in: <span>${extras.join(', ')}</span> — not essential here, but rarely harmful to include.</div>` : ''}
    <div class="reveal-row">✓ Reasoning: <span>${scenario.why}</span></div>
    <div class="reveal-row">✓ Possible Communication Flow: <span>${scenario.commFlow}</span></div>
  `;
  revealEl.classList.remove('hidden');
  document.getElementById('s3roles').classList.add('locked');

  const btn = document.getElementById('s3submit');
  btn.textContent = state.roundIndex<2 ? 'Next Situation →' : 'See My Results →';
  btn.disabled = false;
  btn.onclick = ()=>advanceRound();
}

// ---------- RESULTS ----------
function computeScores(){
  const s1 = state.results.s1;
  const ownershipS1 = s1.length ? s1.filter(r=>r.correct).length/s1.length*100 : 0;
  const s3 = state.results.s3;
  const ownershipS3 = s3.length ? s3.filter(r=>r.primaryCorrect).length/s3.length*100 : 0;
  const ownershipScore = Math.round((ownershipS1+ownershipS3)/2);

  const s2 = state.results.s2;
  const workflowScore = s2.length ? Math.round(s2.reduce((a,r)=>a+r.matches/r.total,0)/s2.length*100) : 0;

  const collaborationScore = s3.length ? Math.round(s3.reduce((a,r)=>a+r.overlapFraction,0)/s3.length*100) : 0;

  const delegationScore = s3.length ? Math.round(s3.reduce((a,r)=>{
    const diff = Math.abs(r.selectedTotal-r.idealTotal);
    return a+Math.max(0,100-diff*30);
  },0)/s3.length) : 0;

  return {ownershipScore, workflowScore, collaborationScore, delegationScore};
}

function celebrate(){
  const layer = document.getElementById('confettiLayer');
  const colors = ROLES.map(r=>r.color);
  for(let i=0;i<50;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2+Math.random()*2)+'s';
    p.style.animationDelay = (Math.random()*0.5)+'s';
    layer.appendChild(p);
    p.addEventListener('animationend', ()=>p.remove());
  }
}

function renderResults(){
  const scores = computeScores();
  const s3 = state.results.s3;
  const avgDiff = s3.length ? s3.reduce((a,r)=>a+(r.selectedTotal-r.idealTotal),0)/s3.length : 0;

  const categories = [
    {name:'Ownership', key:'ownershipScore', emoji:'🎯'},
    {name:'Delegation', key:'delegationScore', emoji:'🤝'},
    {name:'Collaboration', key:'collaborationScore', emoji:'🧩'},
    {name:'Workflow Thinking', key:'workflowScore', emoji:'🔀'}
  ];
  const top = categories.reduce((a,b)=> scores[a.key]>=scores[b.key] ? a : b);

  const insights = [
    "Many real workplace problems are solved by teams rather than individuals.",
    "Clear ownership doesn't mean one person does everything — it means someone is accountable for the outcome.",
    "The best workflows loop in the fewest people who can still get it right.",
    "Escalation isn't failure — it's how organizations route decisions to whoever has the authority to make them."
  ];
  const insight = insights[Math.floor(Math.random()*insights.length)];

  const overAssignNote = avgDiff > 0.4
    ? "In the collaboration challenges, you leaned toward looping in more people than the situation strictly needed — a safe instinct, though it's worth noticing when a smaller team could move faster."
    : avgDiff < -0.4
    ? "You often kept ownership narrow, assigning responsibility to a single role even in situations that tend to involve a few different teams."
    : "You generally matched team size to the situation reasonably well, without over- or under-assigning very often.";

  const collabNote = scores.collaborationScore < 65
    ? "The specific teams you looped in didn't always line up with who's typically involved — that's a natural blind spot when a situation feels like one department's problem."
    : "You were fairly good at identifying which teams actually needed to be involved, not just who was affected.";

  container.innerHTML = `
    <div class="stage-label">🎉 Organizational Thinking Dashboard</div>
    <div class="chart-card">
      ${categories.map(c=>`
        <div class="bar-row">
          <div class="bar-label">${c.emoji} ${c.name}</div>
          <div class="bar-track"><div class="bar-fill" data-target="${scores[c.key]}" style="width:0%"></div></div>
          <div class="bar-pct">${scores[c.key]}%</div>
        </div>
      `).join('')}
    </div>
    <div class="reflection-card">
      <h3>Final Reflection</h3>
      <p>✅ <strong>What you understood well:</strong> ${top.name} (${scores[top.key]}%) tended to be your strongest lens on these scenarios.</p>
      <p>⚖️ <strong>Where you tended to over-assign responsibility:</strong> ${overAssignNote}</p>
      <p>🌱 <strong>Where you underestimated collaboration:</strong> ${collabNote}</p>
      <p>💡 <strong>One insight:</strong> ${insight}</p>
    </div>
    <div class="action-row"><button id="replayBtn" class="btn-primary">Replay 🔁</button></div>
  `;

  setTimeout(()=>{
    document.querySelectorAll('.bar-fill').forEach(f=>{ f.style.width = f.dataset.target+'%'; });
  }, 100);

  document.getElementById('replayBtn').onclick = ()=>initGame();
}

// ---------- BOOT ----------
initGame();
</script>
</body>
